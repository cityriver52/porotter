<style>

  }

    --danger: #f0747c;

  @media (prefers-color-scheme: dark) {

      --bg: #0e1419;
      --surface: #151d24;
      --surface-soft: #1d2831;

  * { box-sizing: border-box; }

  .search-box:focus-within { border-color: var(--accent); background: var(--surface); }
  .search-box input { min-width: 0; width: 100%; border: 0; outline: 0; background: transparent; }
  .advanced-filters { display: grid; grid-template-columns: 1fr 1fr 1fr auto; align-items: end; gap: 9px; margin-top: 12px; padding: 13px; border-radius: 13px; background: var(--surface-soft); }
  .advanced-filters label, .settings-card label, .field-label { display: grid; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 650; }

  .rail-heading h2 { margin: 0; font-size: 17px; }

  .settings-section p { margin: -5px 0 0; color: var(--muted); font-size: 13px; }
  .settings-card > .primary-button { justify-self: start; }
  .button-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .trash-actions { display: flex; gap: 8px; margin-top: 10px; }

  .app-dialog { width: min(580px, calc(100vw - 28px)); max-height: min(82vh, 760px); padding: 0; overflow: hidden; border: 1px solid var(--line); border-radius: 20px; background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
  .app-dialog::backdrop { background: rgba(8, 17, 24, .55); backdrop-filter: blur(3px); }

  .reply-form { padding: 14px 18px; border-top: 1px solid var(--line); }

  .reply-footer { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-top: 8px; }
  .edit-dialog form { padding-bottom: 17px; }
  .edit-dialog textarea { margin: 15px 18px 8px; width: calc(100% - 36px); padding: 11px; border: 1px solid var(--line); border-radius: 12px; background: var(--surface-soft); font-size: 15px; }
  .edit-dialog .field-label { margin: 0 18px; }
  .dialog-actions { display: flex; justify-content: flex-end; gap: 9px; padding: 15px 18px 0; }

  .confirm-dialog p { margin: 0; color: var(--muted); }
  .confirm-dialog .dialog-actions { justify-content: center; padding: 20px 0 0; }
  .confirm-icon { display: grid; place-items: center; width: 48px; height: 48px; margin: auto; border-radius: 50%; background: var(--danger-soft); color: var(--danger); font-size: 24px; font-weight: 850; }

  .toast-region { position: fixed; z-index: 1000; right: 20px; bottom: 20px; display: grid; gap: 8px; width: min(360px, calc(100vw - 40px)); }
  .toast { padding: 12px 15px; border: 1px solid var(--line); border-radius: 12px; background: var(--text); color: var(--surface); box-shadow: var(--shadow); animation: toast-in .22s ease-out; }
  .toast.error { background: var(--danger); color: white; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(9px); } }
  .initial-loader { position: fixed; z-index: 2000; inset: 0; display: grid; place-content: center; justify-items: center; gap: 15px; background: var(--bg); color: var(--muted); transition: opacity .25s ease; }
  .initial-loader.hidden { visibility: hidden; opacity: 0; pointer-events: none; }
  .skeleton-card { display: flex; gap: 13px; padding: 18px 21px; border-bottom: 1px solid var(--line); }
  .skeleton { border-radius: 8px; background: linear-gradient(90deg, var(--surface-soft), var(--line), var(--surface-soft)); background-size: 220% 100%; animation: shimmer 1.3s infinite; }
  @keyframes shimmer { to { background-position-x: -220%; } }
  .skeleton-avatar { width: 43px; height: 43px; border-radius: 50%; }

  .skeleton-lines span:nth-child(2) { width: 88%; }

  .mobile-nav { display: none; }

  @media (max-width: 1060px) {

  @media (max-width: 860px) {

    .mobile-nav button.active { color: var(--accent-strong); }

    .toast-region { bottom: 82px; }

  @media (max-width: 560px) {

    .app-shell { width: 100%; }
    .main-column { border: 0; }
    .column-header { min-height: 63px; padding: 10px 15px; }
    .column-header h1 { font-size: 19px; }
    .composer-card { gap: 10px; padding: 15px 14px 12px; }

    .quick-tags { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
    .tag-toggle { flex: 0 0 auto; }
    .composer-footer { grid-template-columns: 1fr auto; }

  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
  }
</style>
